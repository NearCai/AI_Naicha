# =============================================================================
# SKU 级数据 (skus)
# 字段说明:
#   sku_id            — 唯一 id, 格式 <brand>_<short_name>
#   brand_id          — 关联 brands[].brand_id
#   sku_name_zh       — 中文产品名(以品牌官方为准)
#   style             — 对齐 RecipeGenerator 的 6 大风格分类
#   price_cny         — 当前标价(中杯, 若有版本则取主销规格)
#   launch_year       — 上线年份(若已知)
#   signature         — 是否品牌招牌
#   trending_2025     — 是否当下热销
#   proxies.annual_cups_disclosed       — 品牌官方/招股书披露的杯量
#   proxies.annual_cups_disclosed_year  — 数据年份
#   proxies.annual_revenue_disclosed_cny — 销售额(若有)
#   proxies.signature_share             — 该 SKU 在该品牌中的占比(若有)
#   data_sources      — 引用列表
# =============================================================================
