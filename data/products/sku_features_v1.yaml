# Market intelligence: 新茶饮 brands + SKU sales proxies (v1, 2024-2025 vintage)
#
# Per 技术方案书 §3.3.2 销量端 + v1 实现方案 §5 数据资产清单 (sku_features_v1.parquet 的 yaml 版).
#
# Provenance levels (data_sources[].type):
#   ipo_prospectus      Listed company prospectus / 上市公司招股书 (HIGH confidence)
#   annual_report       Annual / interim report / 年报中期 (HIGH)
#   press_release       Brand official press release / 品牌官方新闻 (HIGH on its own claim)
#   industry_report     Third-party industry research / 艾瑞CBNData等行业报告 (MEDIUM)
#   news_media          News article / 媒体报道 (LOW-MEDIUM, often citing other source)
#   estimated           Calculated / derived from other public data (LOW, flagged)
#
# Coverage as of this vintage (2024 H2 — 2025):
#   - 10 brands (top 9 by store count + 茶颜悦色 regional)
#   - 54 SKUs (招牌 + 当下热销 + 历史经典)
#   - Industry section: market size, trending flavors, online channel data
#
# CRITICAL: Per-SKU actual cup-level sales are private. We use:
#   - publicly disclosed cup counts from prospectuses / press releases (the few that exist)
#   - signature/招牌 flag for SKUs known to be brand staples but no cup data
#   - relative price tier
#   - launch year (rough)
#
# If you scrape per-SKU social engagement (大众点评 推荐数, 小红书 笔记数), add fields
# in the proxies block (e.g., dianping_recommends_n, xhs_notes_n) and source them.

# =============================================================================
# 行业级数据 (industry)
# =============================================================================
industry:
  market_size_cny_2024: 354_700_000_000   # 3547 亿元
  market_growth_rate_2024: 0.064          # 6.4% YoY (down from CAGR 24.9% in 2017-2022)
  total_stores_china_2025_09: 415_000     # 41.5 万家全国 (含所有现制茶饮)
  net_store_change_yoy_2024_2025: -39_000 # -3.9 万 (洗牌期, 新开 11.8 万 - 闭店 15.7 万)

  top_flavor_3yr:           # 过去 3 年茶饮 Top 10 风味
    - 茉莉绿茶
    - 柠檬
    - 玫瑰
    - 桂花
    - 桃子
    - 橙子
    - 龙井
    - 黑糖
    - 西瓜
    - 芒果

  fastest_growing_flavor_1yr:   # 过去 1 年增速 Top 风味
    - 芭乐
    - 车厘子
    - 黄皮
    - 陈皮
    - 桑葚
    - 话梅
    - 龙眼
    - 树莓
    - 蔓越莓
    - 石榴

  coffee_top_flavor_3yr:
    - 椰子
    - 巧克力
    - 橙子
    - 荔枝
    - 开心果
    - 焦糖
    - 燕麦
    - 芝士
    - 山茶花
    - 碧根果

  source_industry_report:
    cite: "解码40万家门店混战:2025最全现制茶饮行业研究报告 / KERRY&饿了么 2025现制饮品风味图谱"
    type: industry_report
    year: 2025
    note: |
      Industry size from 36氪 / 投中网 industry report citations. Trending flavor
      lists from KERRY × 饿了么 2025 风味图谱报告.

