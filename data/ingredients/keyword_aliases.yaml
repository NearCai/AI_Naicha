厚乳:     [creamy, rich, thick, dense, milky]
鲜奶:     [milky, creamy, fresh, smooth]
奶盖:     [salty, creamy, foamy, savory]
燕麦:     [grain, oat, smooth]
燕麦奶:   [grain, oat, smooth]
咖啡师版: [creamy, foamable]
低脂:     [light_creamy, thin]
脱脂:     [thin, light_creamy, watery]

# ===== Coffee-style modifiers =====
咖啡:   [coffee, bitter, roasted, intense]
冷萃:   [smooth, chocolate, low_acid]
浓缩:   [bitter, intense, roasted]

