# Chinese keyword → English flavor_descriptors mapping.
# Used by RecipeGenerator to translate LLM-Planner keywords (Chinese) into
# matches against ingredient flavor_descriptors (English).
#
# Scoring during ingredient picking (see _score_ingredient_for_keywords):
#   - name_zh substring match    × 3   (strongest)
#   - notes_zh substring match   × 2
#   - descriptor mapped match    × 1   (via this file)
#
# Keep this file extensible: add new keywords as the LLM Planner output evolves.

# ===== Generic sensory groups =====
花香:   [floral, fragrant, aromatic, jasmine, rose, osmanthus]
果香:   [fruity, berry, tropical, citrus, juicy]
茶香:   [malty, robust, smoky, grassy, vegetal, complex, brisk]
奶香:   [milky, creamy, dairy, smooth, rich]
咖啡香: [coffee, roasted, intense]
清爽:   [refreshing, fresh, light, bright, brisk, cooling, low_acid]
微甜:   [mild_sweet, slight_sweet, sweet]
浓郁:   [rich, dense, intense, robust, full_body]
顺滑:   [smooth, creamy, silky]
咸:     [salty, savory, mineral]
咸甜:   [salty, sweet, savory]
苦:     [bitter, dark, intense, roasted]
酸:     [sour, tart, citrus]
回甘:   [sweet_aftertaste, mellow, lingering, rich_aftertaste]
醇厚:   [rich, dense, complex, mellow]
香气:   [fragrant, aromatic, floral]

