桂花:   [osmanthus, floral]
茉莉:   [jasmine, floral]
玫瑰:   [rose, floral, romantic]
薰衣草: [lavender, herbal, floral]
薄荷:   [mint, cooling, fresh]
香草:   [vanilla, sweet, aromatic]
椰:     [coconut, tropical]
椰香:   [coconut, tropical]
焦糖:   [caramelized, caramel]
海盐:   [salty, mineral]
肉桂:   [cinnamon, warm, sweet_spice]
姜:     [pungent, warm, spicy]
抹茶:   [grassy, umami, intense_green]
可可:   [chocolate, dark, intense]
巧克力: [chocolate, dark, sweet]
蜂蜜:   [honey, floral, mellow]

