name: CI

on:
  push:
    branches: [main, master, develop, dev]
  pull_request:
    branches: [main, master, develop, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          # Install core + dev; SKIP [ml] (torch/PyG) and [scrape] (playwright)
          # because tests mock those modules. Saves ~3GB / 5min per CI run.
          pip install -e ".[dev]"

      - name: Lint with ruff
        # Use pyproject [tool.ruff.lint] config (select + ignore + per-file-ignores)
        run: ruff check beverage_ai scripts tests

      - name: Run tests
        run: pytest --cov=beverage_ai --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  smoke-cli:
    name: smoke-test CLI
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[dev]"
      - name: vocab loads + reports correct count
        run: |
          beverage-ai vocab count
          beverage-ai vocab list --category tea_base
      - name: end-to-end pipeline (mock)
        run: |
          beverage-ai pipeline --request "夏季奶茶低糖" --top-k 3 --n-candidates 30
      - name: validate reference recipes
        run: python scripts/validate_recipes.py
